TitanU OS Genesis — Setup Guide

Version: 3.1.2
Edition: Genesis (Local)

1. Prerequisites

Before installing TitanU OS, ensure your system meets the following requirements to guarantee stability and correct operation.

Operating System

Windows 10 or Windows 11 (64-bit)

Memory (RAM)

Minimum: 16 GB

Recommended: 32 GB (for smoother local inference and multitasking)

Storage

~10 GB free disk space
(Required for application files and local model storage)

Required Dependency

Ollama must be installed and running
TitanU OS relies on Ollama for local model inference.

2. Install Ollama (Critical)

TitanU OS will not initialize unless Ollama is installed and active.

Step 1 — Download

Visit: https://ollama.com

Download the Windows installer

Step 2 — Install

Run the installer

Complete the default installation steps

Step 3 — Pull Required Model

Open Command Prompt or PowerShell, then run:

ollama pull qwen2.5-coder:3b


Important:
qwen2.5-coder:3b is required for TitanU OS v3.1.2 backend logic.

Step 4 — Verify

Confirm the Ollama icon is visible in the Windows system tray

Ollama must remain running while TitanU OS is in use

3. Install TitanU OS

Download the installer:
TitanU_OS_v3.1.2_Setup.exe

Run the installer.

Follow the on-screen prompts to select an installation directory.

The application will launch automatically after installation completes.

4. First Run & Activation
Initialization

Launch TitanU OS

Allow the boot sequence to complete
(May take 10–30 seconds on first run)

Activation

When prompted, enter your Genesis Key.

Standard Genesis Users:
Use the key provided with your download

Authorized Developers / Internal:
Use an approved override key if applicable

Boot Verification

TitanU OS will automatically perform the following checks:

Connect to the local backend

Verify qwen2.5-coder:3b is available via Ollama

Unlock the Commander Pane (main interface)

✅ Successful completion indicates the system is ready.

5. Troubleshooting
Issue: “Model not found”

Cause: Required Ollama model not installed
Fix:

ollama pull qwen2.5-coder:3b

Issue: Backend fails to start

Checks:

Ensure Ollama is running

Verify the following ports are not blocked by a firewall:

11434 — Ollama

8000 — TitanU backend

Issue: Stuck on “Connecting…”

Fix:

Close TitanU OS

Ensure Ollama is running (tray icon visible)

Relaunch TitanU OS

System Guarantees

Local execution by default

No background uploads

No cloud dependency

No persistent external compute

All memory and files remain on the local machine

LOCAL • SOVEREIGN • PRIVATE
